name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run ESLint
        id: eslint
        run: npm run lint || true
      - name: Run Prettier
        id: prettier
        run: npx prettier --check . || true
      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintOutput = `${{ steps.eslint.outputs.stdout }}`;
            const prettierOutput = `${{ steps.prettier.outputs.stdout }}`;
            const commentBody = `## Code Quality Report\n\n### ESLint\n${eslintOutput}\n\n### Prettier\n${prettierOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run Tests and Generate Coverage
        id: test
        run: npm test -- --coverage || true
      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testOutput = `${{ steps.test.outputs.stdout }}`;
            const commentBody = `## Test Coverage Report\n\n${testOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Run Dependency Vulnerability Check
        id: npm-audit
        run: npm audit || true
      - name: Run Secrets Scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          format: text
      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const npmAuditOutput = `${{ steps.npm-audit.outputs.stdout }}`;
            const trufflehogOutput = `${{ steps.trufflehog.outputs.stdout }}`;
            const commentBody = `## Security Scan Report\n\n### Vulnerabilities (npm audit)\n${npmAuditOutput}\n\n### Secrets Scan (TruffleHog)\n${trufflehogOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build Application
        id: build
        run: npm run build || true
      - name: Validate Endpoints
        id: validate-endpoints
        run: |
          # Start application in background
          npm start &
          sleep 10
          # Check health endpoint (adjust port/path as needed)
          curl -s http://localhost:3000/health || echo "Health endpoint not accessible"
      - name: Create Deployment Preview Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: dist/
      - name: Post Build Validation Status
        uses: actions/github-script@v7
        with:
          script: |
            const buildOutput = `${{ steps.build.outputs.stdout }}`;
            const endpointOutput = `${{ steps.validate-endpoints.outputs.stdout }}`;
            const commentBody = `## Build Validation\n\n### Build Status\n${buildOutput}\n\n### Endpoint Validation\n${endpointOutput}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });